<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body{
font-family:Arial;
width:600px;
margin:40px auto;
}

#chat{
border:1px solid #ccc;
padding:10px;
height:400px;
overflow:auto;
margin-top:10px;
}

input{
width:70%;
padding:8px;
}

button{
padding:8px 12px;
}
</style>

</head>

<body>

<h2>AI Chat</h2>

<input id="input" placeholder="输入问题">
<button onclick="send()">发送</button>

<div id="chat"></div>

<script>

async function send(){

let input=document.getElementById("input").value

if(!input) return

document.getElementById("chat").innerHTML +=
"<p><b>你:</b> "+input+"</p>"

let res=await fetch("https://api.coze.cn/open_api/v2/chat",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer sat_GWjRzoiSDexgEoapkLkNoboUB7ED5DtPBlEIzv6GVCAVChlLftS9C0sa3ACy9mbX"
},
body:JSON.stringify({
bot_id:"7605462028329123890",
user:"123",
query:input
})
})

let data=await res.json()

console.log(data)

let reply=data?.data?.messages?.[0]?.content || "AI没有返回内容"

document.getElementById("chat").innerHTML +=
"<p><b>AI:</b> "+reply+"</p>"

document.getElementById("input").value=""

}

</script>

</body>
</html>
